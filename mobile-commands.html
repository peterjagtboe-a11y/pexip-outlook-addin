<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="config.js"></script>
    <script>
        // Mobile function for Pexip add-in
        Office.initialize = function() {};

        function insertPexipMeeting(event) {
            // Get VMR details from config or localStorage
            var vmrUsername = PexipConfig.defaultVmrUsername || localStorage.getItem('pexip_vmrUsername') || 'your.vmr';
            var vmrDomain = localStorage.getItem('pexip_vmrDomain') || PexipConfig.vmrDomain;
            
            var webLink = 'https://' + vmrDomain + '/' + vmrUsername;
            var vcEndpoint = vmrUsername + '@' + vmrDomain;
            var appLink = 'pexip://' + vmrUsername + '@' + vmrDomain;
            
            // Create HTML formatted content with configurable labels
            var pexipHTML = '<br><br><strong>' + PexipConfig.labels.header + '</strong><br><br>' +
                '<strong>' + PexipConfig.labels.webBrowser + '</strong> ' + webLink + '<br><br>' +
                '<strong>' + PexipConfig.labels.vcEndpoint + '</strong> ' + vcEndpoint + '<br><br>' +
                '<strong>' + PexipConfig.labels.pexipApp + '</strong> ' + appLink + '<br>';
            
            try {
                // Insert into appointment body
                Office.context.mailbox.item.body.getAsync(
                    Office.CoercionType.Html,
                    function(result) {
                        if (result.status === Office.AsyncResultStatus.Succeeded) {
                            var currentBody = result.value || '';
                            var newBody = currentBody + pexipHTML;
                            
                            Office.context.mailbox.item.body.setAsync(
                                newBody,
                                { coercionType: Office.CoercionType.Html },
                                function(setResult) {
                                    if (setResult.status === Office.AsyncResultStatus.Succeeded) {
                                        // Success - wait a bit before completing to ensure save
                                        setTimeout(function() {
                                            event.completed({ allowEvent: true });
                                        }, 500);
                                    } else {
                                        // Error setting body
                                        event.completed({ allowEvent: false });
                                    }
                                }
                            );
                        } else {
                            // Error getting body
                            event.completed({ allowEvent: false });
                        }
                    }
                );
            } catch (error) {
                // Exception occurred
                event.completed({ allowEvent: false });
            }
        }
    </script>
</head>
<body>
</body>
</html>
