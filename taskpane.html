<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pexip Meeting</title>
    
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        .container {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 100%;
        }
        
        h2 {
            margin: 0 0 20px 0;
            color: #0F172A;
            font-size: 18px;
            font-weight: 600;
        }
        
        .info {
            background: #F0F7FF;
            border: 1px solid #0066FF;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #0F172A;
        }
        
        .info strong {
            color: #0066FF;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #0F172A;
            margin-bottom: 6px;
        }
        
        input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #E2E8F0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: #0066FF;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #0066FF;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }
        
        button:hover {
            background: #0052CC;
        }
        
        button:disabled {
            background: #CBD5E1;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #64748B;
        }
        
        .btn-secondary:hover {
            background: #475569;
        }
        
        .success {
            background: #10B981;
            color: white;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            margin-top: 12px;
            display: none;
            font-size: 14px;
        }
        
        .success.show {
            display: block;
        }
        
        .preview {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .view {
            display: none;
        }
        
        .view.active {
            display: block;
        }
        
        .helper-text {
            font-size: 12px;
            color: #64748B;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Settings View -->
        <div id="settingsView" class="view active">
            <h2>⚙️ Pexip Settings</h2>
            
            <div class="form-group">
                <label for="vmrUsername">Your VMR Username</label>
                <input type="text" id="vmrUsername" placeholder="e.g., peter.jagtboe" />
                <p class="helper-text">Just your username, not the full email</p>
            </div>
            
            <div class="form-group">
                <label for="vmrDomain">VMR Domain</label>
                <input type="text" id="vmrDomain" placeholder="e.g., pexip.vc" value="pexip.vc" />
                <p class="helper-text">Your Pexip domain (usually pexip.vc)</p>
            </div>
            
            <button id="saveSettingsBtn">Save Settings</button>
        </div>
        
        <!-- Main View -->
        <div id="mainView" class="view">
            <h2>📅 Add Pexip Meeting</h2>
            
            <div class="info">
                <strong>Your VMR:</strong> <span id="displayVMR"></span>
            </div>
            
            <div class="preview" id="preview"></div>
            
            <button id="insertButton">Insert Pexip Details</button>
            <button id="changeSettingsBtn" class="btn-secondary">Change Settings</button>
            
            <div class="success" id="success">✓ Details added!</div>
        </div>
    </div>
    
    <script>
        let vmrUsername = '';
        let vmrDomain = 'pexip.vc';
        
        Office.onReady(function(info) {
            loadSettings();
            
            document.getElementById('saveSettingsBtn').onclick = saveSettings;
            document.getElementById('insertButton').onclick = insertPexipDetails;
            document.getElementById('changeSettingsBtn').onclick = showSettings;
        });
        
        function loadSettings() {
            Office.context.roamingSettings.loadAsync(function(result) {
                if (result.status === Office.AsyncResultStatus.Succeeded) {
                    vmrUsername = Office.context.roamingSettings.get('vmrUsername') || '';
                    vmrDomain = Office.context.roamingSettings.get('vmrDomain') || 'pexip.vc';
                    
                    if (vmrUsername) {
                        showMain();
                    } else {
                        showSettings();
                    }
                }
            });
        }
        
        function saveSettings() {
            vmrUsername = document.getElementById('vmrUsername').value.trim();
            vmrDomain = document.getElementById('vmrDomain').value.trim() || 'pexip.vc';
            
            if (!vmrUsername) {
                alert('Please enter your VMR username');
                return;
            }
            
            // Disable button during save
            var btn = document.getElementById('saveSettingsBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';
            
            try {
                // Save to Office roaming settings
                Office.context.roamingSettings.set('vmrUsername', vmrUsername);
                Office.context.roamingSettings.set('vmrDomain', vmrDomain);
                Office.context.roamingSettings.saveAsync(function(result) {
                    btn.disabled = false;
                    btn.textContent = 'Save Settings';
                    
                    if (result.status === Office.AsyncResultStatus.Succeeded) {
                        showMain();
                    } else {
                        alert('Error saving settings: ' + (result.error ? result.error.message : 'Unknown error'));
                    }
                });
            } catch (e) {
                btn.disabled = false;
                btn.textContent = 'Save Settings';
                alert('Error: ' + e.message);
            }
        }
        
        function showSettings() {
            document.getElementById('vmrUsername').value = vmrUsername;
            document.getElementById('vmrDomain').value = vmrDomain;
            document.getElementById('settingsView').classList.add('active');
            document.getElementById('mainView').classList.remove('active');
        }
        
        function showMain() {
            const fullVMR = vmrUsername + '@' + vmrDomain;
            document.getElementById('displayVMR').textContent = fullVMR;
            
            const preview = generatePexipText();
            document.getElementById('preview').textContent = preview;
            
            document.getElementById('settingsView').classList.remove('active');
            document.getElementById('mainView').classList.add('active');
        }
        
        function generatePexipText() {
            const webLink = 'https://' + vmrDomain + '/' + vmrUsername;
            const vcEndpoint = vmrUsername + '@' + vmrDomain;
            const appLink = 'pexip://' + vmrUsername + '@' + vmrDomain;
            
            return `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
PEXIP MEETING DETAILS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
 
Join from web browser:
${webLink}
 
Join from VC endpoint:
${vcEndpoint}
 
Join from Pexip App:
${appLink}`;
        }
        
        function insertPexipDetails() {
            const button = document.getElementById('insertButton');
            button.disabled = true;
            button.textContent = 'Inserting...';
            
            const pexipDetails = '\n\n' + generatePexipText();
            
            Office.context.mailbox.item.body.getAsync(
                Office.CoercionType.Text,
                function(result) {
                    if (result.status === Office.AsyncResultStatus.Succeeded) {
                        let currentBody = result.value || '';
                        let newBody = currentBody + pexipDetails;
                        
                        Office.context.mailbox.item.body.setAsync(
                            newBody,
                            { coercionType: Office.CoercionType.Text },
                            function(setResult) {
                                if (setResult.status === Office.AsyncResultStatus.Succeeded) {
                                    document.getElementById('success').classList.add('show');
                                    button.textContent = 'Insert Pexip Details';
                                    button.disabled = false;
                                    
                                    setTimeout(function() {
                                        document.getElementById('success').classList.remove('show');
                                    }, 3000);
                                } else {
                                    button.textContent = 'Error - Try Again';
                                    button.disabled = false;
                                }
                            }
                        );
                    }
                }
            );
        }
    </script>
</body>
</html>
